# PV Data

apiVersion: v1

kind: PersistentVolume

metadata:

  name: {{ .Values.storage.data.pvName }}

  labels:

    {{- include "odoo.labels" . | nindent 4 }}

spec:

  capacity:

    storage: {{ .Values.storage.data.size }}

  accessModes:

    - ReadWriteOnce

  storageClassName: {{ .Values.storage.class }}

  persistentVolumeReclaimPolicy: Retain

  claimRef:                              # ÔåÉ force le binding au bon PVC

    namespace: {{ .Values.namespace }}

    name: odoo-data-pvc

  local:

    path: {{ .Values.storage.data.path }}

  nodeAffinity:

    required:

      nodeSelectorTerms:

        - matchExpressions:

            - key: kubernetes.io/hostname

              operator: In

              values:

                - {{ .Values.workerNode }}

