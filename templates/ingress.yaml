
{{- if .Values.ingress.enabled }}

apiVersion: networking.k8s.io/v1

kind: Ingress

metadata:

  name: odoo-ingress

  namespace: {{ .Values.namespace }}

  labels:

    {{- include "odoo.labels" . | nindent 4 }}

  annotations:

    {{- toYaml .Values.ingress.annotations | nindent 4 }}

spec:

  ingressClassName: {{ .Values.ingress.className }}

  rules:

  - host: {{ .Values.ingress.host }}

    http:

      paths:

      - path: /

        pathType: Prefix

        backend:

          service:

            name: odoo-service

            port:

              number: {{ .Values.service.httpPort }}

      - path: /longpolling

        pathType: Prefix

        backend:

          service:

            name: odoo-service

            port:

              number: {{ .Values.service.longpollingPort }}

{{- end }}

